name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc gcc-aarch64-linux-gnu libc6-dev-arm64-cross make pkg-config file \
            iperf3 iproute2 iptables iputils-ping

      - name: Build panel web
        run: make panel-web

      - name: Verify repository structure
        run: make verify-local

      - name: Go tests
        run: GOTOOLCHAIN=local go test ./...

      - name: Go vet
        run: GOTOOLCHAIN=local go vet ./...

      - name: Fastpath tests
        run: make fastpath

      - name: Build Linux release architectures
        run: make build-linux

      - name: Network namespace integration
        run: sudo -E env "PATH=$PATH" "GOTOOLCHAIN=local" make integration-netns
