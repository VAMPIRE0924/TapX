name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc make pkg-config file nodejs npm \
            iproute2 iptables iputils-ping

      - name: Verify repository structure
        run: make verify-local

      - name: Go tests
        run: GOTOOLCHAIN=local go test ./...

      - name: Go vet
        run: GOTOOLCHAIN=local go vet ./...

      - name: Frontend syntax
        run: node --check internal/panel/static/app.js

      - name: Fastpath tests
        run: make fastpath

      - name: Network namespace integration
        run: sudo -E env "PATH=$PATH" "GOTOOLCHAIN=local" make integration-netns
