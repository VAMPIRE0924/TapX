<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TapX</title>
    <link rel="stylesheet" href="app.css">
  </head>
  <body>
    <section class="login-screen" id="loginScreen" hidden>
      <form class="login-panel" id="loginForm">
        <div class="brand login-brand">
          <div class="brand-mark">TX</div>
          <div>
            <div class="brand-name">TapX</div>
            <div class="brand-sub">Control Plane</div>
          </div>
        </div>
        <label class="login-field">
          <span>Username</span>
          <input id="loginUsername" autocomplete="username" required>
        </label>
        <label class="login-field">
          <span>Password</span>
          <input id="loginPassword" type="password" autocomplete="current-password" required>
        </label>
        <button class="button primary login-button" type="submit">
          <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/></svg>
          Sign In
        </button>
      </form>
    </section>

    <div class="shell" id="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">TX</div>
          <div>
            <div class="brand-name">TapX</div>
            <div class="brand-sub">Control Plane</div>
          </div>
        </div>
        <nav class="nav" id="nav"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">Dashboard</h1>
            <div class="crumb" id="pageCrumb">Runtime overview</div>
          </div>
          <div class="topbar-actions">
            <div class="runtime-chip" id="runtimeChip">
              <span class="dot"></span>
              <span>loading</span>
            </div>
            <button class="icon-button logout-button" id="logoutButton" title="Sign out" aria-label="Sign out" hidden>
              <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
            </button>
          </div>
        </header>

        <section class="workspace" id="workspace"></section>
      </main>
    </div>

    <div class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer-backdrop" data-close-drawer></div>
      <section class="drawer-panel">
        <header class="drawer-head">
          <div>
            <h2 id="drawerTitle">Object</h2>
            <div class="drawer-meta" id="drawerMeta">Fields + JSON</div>
          </div>
          <button class="icon-button" data-close-drawer title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </header>
        <div class="editor-layout">
          <form class="object-form" id="objectForm"></form>
          <section class="json-section">
            <div class="json-head">JSON</div>
            <textarea class="json-editor" id="objectEditor" spellcheck="false"></textarea>
          </section>
        </div>
        <footer class="drawer-actions">
          <button class="button ghost" data-close-drawer>Cancel</button>
          <button class="button primary" id="saveObjectButton">
            <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
            Save
          </button>
        </footer>
      </section>
    </div>

    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
  </body>
</html>
